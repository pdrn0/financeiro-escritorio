<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro — Escritório</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--surface:#fff;--surface2:#f1f3f6;--border:#e2e6ec;
  --text:#1a1d23;--text2:#6b7280;--text3:#9ca3af;
  --green:#16a34a;--green-bg:#dcfce7;--green-light:#bbf7d0;
  --red:#dc2626;--red-bg:#fee2e2;--red-light:#fecaca;
  --blue:#2563eb;--blue-bg:#dbeafe;
  --amber:#d97706;--amber-bg:#fef3c7;
  --igor:#7c3aed;--igor-bg:#ede9fe;--igor-light:#ddd6fe;
  --pedro:#0891b2;--pedro-bg:#cffafe;--pedro-light:#a5f3fc;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--surface:#1a1d24;--surface2:#222530;--border:#2d3141;
    --text:#f1f3f9;--text2:#8b92a9;--text3:#4f566b;
    --green:#4ade80;--green-bg:#052e16;--green-light:#14532d;
    --red:#f87171;--red-bg:#450a0a;--red-light:#7f1d1d;
    --blue:#60a5fa;--blue-bg:#1e3a5f;
    --amber:#fbbf24;--amber-bg:#451a03;
    --igor:#a78bfa;--igor-bg:#2e1065;--igor-light:#4c1d95;
    --pedro:#22d3ee;--pedro-bg:#083344;--pedro-light:#164e63;
  }
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{display:flex;flex-direction:column;min-height:100vh}
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;
  height:60px;position:sticky;top:0;z-index:100;gap:12px;
}
.logo{font-weight:600;font-size:16px;letter-spacing:-.3px;white-space:nowrap}
.logo span{color:var(--text2);font-weight:400}
.month-nav{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px}
.month-nav button{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;line-height:1;padding:2px 5px;border-radius:4px;transition:background .15s}
.month-nav button:hover{background:var(--border)}
.month-label{font-size:13px;font-weight:500;min-width:110px;text-align:center}
.nav-tabs{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px}
.nav-tab{padding:5px 14px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.nav-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.main{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 4rem;width:100%}
.page{display:none}
.page.active{display:block}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.25rem 1rem}
.summary-card .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-bottom:8px}
.summary-card .value{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;letter-spacing:-.5px}
.summary-card .sub{font-size:12px;color:var(--text3);margin-top:4px}
.summary-card.entradas .value{color:var(--green)}
.summary-card.saidas .value{color:var(--red)}
.content-grid{display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-header{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-title{font-size:14px;font-weight:600}
.filter-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:3px}
.filter-tab{padding:4px 10px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text2);transition:all .15s}
.filter-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.transactions-list{max-height:420px;overflow-y:auto}
.transaction-item{display:flex;align-items:center;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);gap:10px;transition:background .1s}
.transaction-item:last-child{border-bottom:none}
.transaction-item:hover{background:var(--surface2)}
.tx-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:6px}
.tx-pessoa{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:11px;font-weight:500}
.tx-pessoa.igor{background:var(--igor-bg);color:var(--igor)}
.tx-pessoa.pedro{background:var(--pedro-bg);color:var(--pedro)}
.tx-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;text-align:right;flex-shrink:0}
.tx-value.entrada{color:var(--green)}
.tx-value.saida{color:var(--red)}
.tx-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:4px;transition:all .15s;line-height:1;flex-shrink:0}
.tx-del:hover{background:var(--red-bg);color:var(--red)}
.empty-state{padding:2.5rem 1.5rem;text-align:center;color:var(--text3);font-size:14px}
.form-panel{display:flex;flex-direction:column;gap:12px}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.form-title{font-size:14px;font-weight:600;margin-bottom:1rem}
.tipo-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.tipo-btn{padding:9px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.tipo-btn.active-entrada{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.tipo-btn.active-saida{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.pessoa-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.pessoa-btn{padding:9px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.pessoa-btn .avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.pessoa-btn.active-igor{border-color:var(--igor);background:var(--igor-bg);color:var(--igor)}
.pessoa-btn.active-pedro{border-color:var(--pedro);background:var(--pedro-bg);color:var(--pedro)}
.form-group{margin-bottom:10px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--blue);background:var(--surface)}
.btn-add{width:100%;padding:11px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-add:hover{opacity:.85}
.btn-add:disabled{opacity:.5;cursor:not-allowed}
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.cat-item{display:flex;align-items:center;padding:5px 0;gap:10px;border-bottom:1px solid var(--border);font-size:13px}
.cat-item:last-child{border-bottom:none}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;color:var(--text2)}
.cat-value{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.relatorio-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.pessoa-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.pessoa-card-header{padding:.875rem 1.25rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.pessoa-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.pessoa-avatar.igor{background:var(--igor-bg);color:var(--igor)}
.pessoa-avatar.pedro{background:var(--pedro-bg);color:var(--pedro)}
.pessoa-card-name{font-size:15px;font-weight:600}
.pessoa-card-sub{font-size:12px;color:var(--text2)}
.pessoa-card-body{padding:1rem 1.25rem}
.rel-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.rel-row:last-child{border-bottom:none}
.rel-row .rl{color:var(--text2)}
.rel-row .rv{font-family:'DM Mono',monospace;font-weight:500;font-size:13px}
.rel-row.destaque .rl{font-weight:600;color:var(--text)}
.rel-row.destaque .rv{font-size:14px}
.divida-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:16px}
.divida-banner .icon{font-size:28px;flex-shrink:0}
.divida-banner .dtitle{font-size:14px;font-weight:600;margin-bottom:4px}
.divida-banner .dval{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--amber)}
.divida-banner.zerada .dval{color:var(--green)}
.rel-detalhes{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.rel-detalhes-header{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.rel-detalhe-item{display:flex;align-items:center;padding:.625rem 1.25rem;border-bottom:1px solid var(--border);gap:10px;font-size:13px}
.rel-detalhe-item:last-child{border-bottom:none}
.rel-detalhe-desc{flex:1;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rel-detalhe-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.transactions-list::-webkit-scrollbar{width:4px}
.transactions-list::-webkit-scrollbar-track{background:transparent}
.transactions-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:768px){
  header{padding:0 .75rem;height:auto;padding-top:.5rem;padding-bottom:.5rem;flex-wrap:wrap;gap:8px}
  .logo{font-size:14px}
  .nav-tab{padding:4px 10px;font-size:12px}
  .main{padding:1rem .75rem 5rem}
  .summary-grid{grid-template-columns:1fr 1fr;gap:8px}
  .summary-grid .summary-card:last-child{grid-column:1/-1}
  .summary-card .value{font-size:17px}
  .content-grid{grid-template-columns:1fr}
  .form-panel{order:-1}
  .transactions-list{max-height:340px}
  .relatorio-grid{grid-template-columns:1fr}
}
@media(max-width:400px){
  .summary-grid{grid-template-columns:1fr}
  .summary-grid .summary-card:last-child{grid-column:auto}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">Financeiro <span>/ Escritório</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setPage('lancamentos')">Lançamentos</button>
    <button class="nav-tab" onclick="setPage('relatorio')">Relatório</button>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel">—</div>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
</header>
<main class="main">
  <div class="page active" id="page-lancamentos">
    <div class="summary-grid">
      <div class="summary-card entradas"><div class="label">↑ Entradas</div><div class="value" id="totalEntradas">R$ 0,00</div><div class="sub" id="qtdEntradas">0 lançamentos</div></div>
      <div class="summary-card saidas"><div class="label">↓ Saídas</div><div class="value" id="totalSaidas">R$ 0,00</div><div class="sub" id="qtdSaidas">0 lançamentos</div></div>
      <div class="summary-card"><div class="label">= Saldo</div><div class="value" id="totalSaldo">R$ 0,00</div><div class="sub">do mês</div></div>
    </div>
    <div class="content-grid">
      <div>
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Lançamentos</div>
            <div class="filter-tabs">
              <button class="filter-tab active" onclick="setFilter('todos')">Todos</button>
              <button class="filter-tab" onclick="setFilter('entrada')">Entradas</button>
              <button class="filter-tab" onclick="setFilter('saida')">Saídas</button>
              <button class="filter-tab" onclick="setFilter('igor')">Igor</button>
              <button class="filter-tab" onclick="setFilter('pedro')">Pedro</button>
            </div>
          </div>
          <div class="transactions-list" id="txList"><div class="empty-state">Carregando...</div></div>
        </div>
        <div class="chart-section" style="margin-top:12px">
          <div class="panel-title" style="margin-bottom:1rem">Distribuição por categoria</div>
          <div style="position:relative;height:190px"><canvas id="catChart" role="img" aria-label="Gráfico de categorias do mês"></canvas></div>
          <div id="catList" style="margin-top:1rem"></div>
        </div>
      </div>
      <div class="form-panel">
        <div class="form-card">
          <div class="form-title">Novo lançamento</div>
          <div class="tipo-selector">
            <button class="tipo-btn active-entrada" id="btnEntrada" onclick="setTipo('entrada')">&#8593; Entrada</button>
            <button class="tipo-btn" id="btnSaida" onclick="setTipo('saida')">&#8595; Saída</button>
          </div>
          <div class="form-label" style="margin-bottom:6px">Pago por</div>
          <div class="pessoa-selector">
            <button class="pessoa-btn" id="btnIgor" onclick="setPessoa('igor')"><div class="avatar" style="background:var(--igor-bg);color:var(--igor)">IG</div>Igor</button>
            <button class="pessoa-btn" id="btnPedro" onclick="setPessoa('pedro')"><div class="avatar" style="background:var(--pedro-bg);color:var(--pedro)">PE</div>Pedro</button>
          </div>
          <div class="form-group"><label class="form-label">Descrição</label><input class="form-input" id="fDesc" placeholder="Ex: Honorários cliente X" /></div>
          <div class="form-group"><label class="form-label">Valor (R$)</label><input class="form-input" id="fValor" type="number" min="0.01" step="0.01" placeholder="0,00" /></div>
          <div class="form-group"><label class="form-label">Data</label><input class="form-input" id="fData" type="date" /></div>
          <div class="form-group"><label class="form-label">Categoria</label><select class="form-select" id="fCat"></select></div>
          <button class="btn-add" id="btnAdd" onclick="addTransacao()">Adicionar lançamento</button>
        </div>
        <div class="form-card">
          <div class="panel-title" style="margin-bottom:.75rem;font-size:13px">Evolução anual — <span id="anoLabel"></span></div>
          <div style="position:relative;height:150px"><canvas id="anoChart" role="img" aria-label="Entradas e saídas por mês no ano"></canvas></div>
        </div>
      </div>
    </div>
  </div>
  <div class="page" id="page-relatorio">
    <div id="relContent"><div class="empty-state">Carregando relatório...</div></div>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>
<script>
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let currentMes = new Date().getMonth() + 1;
let currentAno = new Date().getFullYear();
let currentTipo = 'entrada';
let currentPessoa = 'igor';
let currentFilter = 'todos';
let currentPage = 'lancamentos';
let allTransacoes = [];
let resumoData = null;
let catChartInst = null, anoChartInst = null;

const fmt = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
const fmtDate = s => { const [y,m,d] = s.split('-'); return `${d}/${m}`; };

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = `${MESES[currentMes-1].slice(0,3)} ${currentAno}`;
  document.getElementById('anoLabel').textContent = currentAno;
}
function changeMonth(dir) {
  currentMes += dir;
  if (currentMes > 12) { currentMes = 1; currentAno++; }
  if (currentMes < 1) { currentMes = 12; currentAno--; }
  updateMonthLabel(); loadData();
}
function setPage(p) {
  currentPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', ['lancamentos','relatorio'][i] === p));
  if (p === 'relatorio' && resumoData) renderRelatorio(resumoData);
}
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach((b,i) => b.classList.toggle('active', ['todos','entrada','saida','igor','pedro'][i] === f));
  renderTransacoes();
}
function setTipo(t) {
  currentTipo = t;
  document.getElementById('btnEntrada').className = 'tipo-btn' + (t==='entrada'?' active-entrada':'');
  document.getElementById('btnSaida').className = 'tipo-btn' + (t==='saida'?' active-saida':'');
  loadCategorias();
}
function setPessoa(p) {
  currentPessoa = p;
  document.getElementById('btnIgor').className  = 'pessoa-btn' + (p==='igor'?' active-igor':'');
  document.getElementById('btnPedro').className = 'pessoa-btn' + (p==='pedro'?' active-pedro':'');
}
async function loadCategorias() {
  const r = await fetch(`/api/categorias?tipo=${currentTipo}`);
  const cats = await r.json();
  const sel = document.getElementById('fCat');
  sel.innerHTML = cats.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
}
async function loadData() {
  const [txRes, resRes] = await Promise.all([
    fetch(`/api/transacoes?mes=${currentMes}&ano=${currentAno}`),
    fetch(`/api/resumo?mes=${currentMes}&ano=${currentAno}`)
  ]);
  allTransacoes = await txRes.json();
  resumoData = await resRes.json();
  document.getElementById('totalEntradas').textContent = fmt(resumoData.entradas);
  document.getElementById('totalSaidas').textContent   = fmt(resumoData.saidas);
  document.getElementById('totalSaldo').textContent    = fmt(resumoData.saldo);
  document.getElementById('totalSaldo').style.color    = resumoData.saldo >= 0 ? 'var(--green)' : 'var(--red)';
  const qE = allTransacoes.filter(t => t.tipo==='entrada').length;
  const qS = allTransacoes.filter(t => t.tipo==='saida').length;
  document.getElementById('qtdEntradas').textContent = `${qE} lançamento${qE!==1?'s':''}`;
  document.getElementById('qtdSaidas').textContent   = `${qS} lançamento${qS!==1?'s':''}`;
  renderTransacoes();
  renderCatChart(resumoData.porCategoria);
  renderAnoChart(resumoData.porMes);
  if (currentPage === 'relatorio') renderRelatorio(resumoData);
}
function renderTransacoes() {
  const list = document.getElementById('txList');
  let filtered = allTransacoes;
  if (currentFilter === 'entrada') filtered = filtered.filter(t => t.tipo==='entrada');
  else if (currentFilter === 'saida') filtered = filtered.filter(t => t.tipo==='saida');
  else if (currentFilter === 'igor') filtered = filtered.filter(t => t.pago_por==='igor');
  else if (currentFilter === 'pedro') filtered = filtered.filter(t => t.pago_por==='pedro');
  if (!filtered.length) { list.innerHTML = `<div class="empty-state">Nenhum lançamento neste período.</div>`; return; }
  list.innerHTML = filtered.map(t => `<div class="transaction-item"><div class="tx-dot" style="background:${t.cor||(t.tipo==='entrada'?'#16a34a':'#dc2626')}"></div><div class="tx-info"><div class="tx-desc">${t.descricao}</div><div class="tx-meta">${t.categoria} · ${fmtDate(t.data)}<span class="tx-pessoa ${t.pago_por}">${t.pago_por==='igor'?'Igor':'Pedro'}</span></div></div><div class="tx-value ${t.tipo}">${t.tipo==='entrada'?'+':'-'}${fmt(t.valor)}</div><button class="tx-del" onclick="deleteTransacao(${t.id})" title="Remover">×</button></div>`).join('');
}
function renderCatChart(porCat) {
  const ctx = document.getElementById('catChart').getContext('2d');
  if (catChartInst) catChartInst.destroy();
  if (!porCat.length) { document.getElementById('catList').innerHTML = ''; return; }
  const top = porCat.slice(0,8);
  catChartInst = new Chart(ctx, { type:'doughnut', data:{ labels:top.map(c=>c.categoria), datasets:[{data:top.map(c=>c.total),backgroundColor:top.map(c=>c.cor||'#888'),borderWidth:0,hoverOffset:4}] }, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fmt(c.parsed)}`}}},cutout:'65%'} });
  document.getElementById('catList').innerHTML = top.map(c => `<div class="cat-item"><div class="cat-dot" style="background:${c.cor||'#888'}"></div><div class="cat-name">${c.categoria}</div><div class="cat-value" style="color:${c.tipo==='entrada'?'var(--green)':'var(--red)'}">${fmt(c.total)}</div></div>`).join('');
}
function renderAnoChart(porMes) {
  const ctx = document.getElementById('anoChart').getContext('2d');
  if (anoChartInst) anoChartInst.destroy();
  const mLabels = MESES.map(m=>m.slice(0,3));
  const entradasData = Array(12).fill(0);
  const saidasData = Array(12).fill(0);
  porMes.forEach(r => { if (r.tipo==='entrada') entradasData[r.mes-1]=r.total; if (r.tipo==='saida') saidasData[r.mes-1]=r.total; });
  anoChartInst = new Chart(ctx,{ type:'bar', data:{labels:mLabels,datasets:[{label:'Entradas',data:entradasData,backgroundColor:'#16a34a88',borderRadius:3},{label:'Saídas',data:saidasData,backgroundColor:'#dc262688',borderRadius:3}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#6b7280'}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:'#6b7280',callback:v=>v>=1000?`${(v/1000).toFixed(0)}k`:v}}}} });
}
function renderRelatorio(r) {
  const rel = r.relatorio;
  if (!rel) return;
  const mesNome = `${MESES[currentMes-1]} ${currentAno}`;
  const dividaBanner = () => {
    if (rel.dividaPedroPagaIgor > 0.01) return `<div class="divida-banner"><div class="icon">⚖️</div><div><div class="dtitle">Pedro deve a Igor em ${mesNome}</div><div class="dval">${fmt(rel.dividaPedroPagaIgor)}</div><div style="font-size:12px;color:var(--text2);margin-top:3px">Igor adiantou despesas de Pedro. Valor a acertar quando as entradas chegarem.</div></div></div>`;
    if (rel.dividaIgorPagaPedro > 0.01) return `<div class="divida-banner"><div class="icon">⚖️</div><div><div class="dtitle">Igor deve a Pedro em ${mesNome}</div><div class="dval" style="color:var(--pedro)">${fmt(rel.dividaIgorPagaPedro)}</div></div></div>`;
    return `<div class="divida-banner zerada"><div class="icon">✅</div><div><div class="dtitle">Despesas equilibradas em ${mesNome}</div><div class="dval">Sem dívidas entre os sócios</div></div></div>`;
  };
  const pessoaCard = (nome, dados) => {
    const isIgor = nome==='igor'; const iniciais = isIgor?'IG':'PE'; const nomeDisplay = isIgor?'Igor':'Pedro'; const pct = isIgor?'75% entradas · 50% despesas':'25% entradas · 50% despesas';
    return `<div class="pessoa-card"><div class="pessoa-card-header"><div class="pessoa-avatar ${nome}">${iniciais}</div><div><div class="pessoa-card-name">${nomeDisplay}</div><div class="pessoa-card-sub">${pct}</div></div></div><div class="pessoa-card-body"><div class="rel-row"><span class="rl">Pagou em despesas</span><span class="rv" style="color:var(--red)">${fmt(dados.pagouSaidas)}</span></div><div class="rel-row"><span class="rl">Cota de despesas (50%)</span><span class="rv">${fmt(dados.cotaSaidas)}</span></div><div class="rel-row"><span class="rl">${dados.creditoSaidas>=0?'Crédito':'Débito'} de despesas</span><span class="rv" style="color:${dados.creditoSaidas>=0?'var(--green)':'var(--red)'}">${dados.creditoSaidas>=0?'+':''}${fmt(dados.creditoSaidas)}</span></div><div class="rel-row"><span class="rl">Cota de entradas (${isIgor?'75%':'25%'})</span><span class="rv" style="color:var(--green)">${fmt(dados.cotaEntradas)}</span></div><div class="rel-row destaque" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><span class="rl">Saldo líquido do mês</span><span class="rv" style="color:${dados.saldoLiquido>=0?'var(--green)':'var(--red)'}">${fmt(dados.saldoLiquido)}</span></div></div></div>`;
  };
  const detalhesPessoa = (nome, dados) => {
    if (!dados.detalhes||!dados.detalhes.length) return '';
    const nd = nome==='igor'?'Igor':'Pedro';
    return `<div class="rel-detalhes" style="margin-bottom:12px"><div class="rel-detalhes-header"><div class="pessoa-avatar ${nome}" style="width:28px;height:28px;font-size:11px">${nome==='igor'?'IG':'PE'}</div><div class="panel-title">${nd} — detalhamento</div></div>${dados.detalhes.map(d=>`<div class="rel-detalhe-item"><div class="tx-dot" style="background:${d.cor||(d.tipo==='entrada'?'#16a34a':'#dc2626')}"></div><div class="rel-detalhe-desc">${d.descricao} <span style="color:var(--text3)">· ${d.categoria}</span></div><div class="rel-detalhe-val" style="color:${d.tipo==='entrada'?'var(--green)':'var(--red)'}">${d.tipo==='entrada'?'+':'-'}${fmt(d.valor)}</div><div style="font-size:11px;color:var(--text3);min-width:36px;text-align:right">${fmtDate(d.data)}</div></div>`).join('')}</div>`;
  };
  document.getElementById('relContent').innerHTML = `<h2 style="font-size:16px;font-weight:600;margin-bottom:1rem;color:var(--text2)">Relatório de ${mesNome}</h2>${dividaBanner()}<div class="relatorio-grid">${pessoaCard('igor',rel.igor)}${pessoaCard('pedro',rel.pedro)}</div><div class="panel" style="margin-bottom:1.5rem"><div class="panel-header"><div class="panel-title">Resumo geral do mês</div></div><div style="padding:1rem 1.25rem"><div class="rel-row"><span class="rl">Total de entradas</span><span class="rv" style="color:var(--green)">${fmt(r.entradas)}</span></div><div class="rel-row"><span class="rl">Total de despesas</span><span class="rv" style="color:var(--red)">${fmt(r.saidas)}</span></div><div class="rel-row"><span class="rl">Igor pagou (despesas)</span><span class="rv">${fmt(rel.igor.pagouSaidas)}</span></div><div class="rel-row"><span class="rl">Pedro pagou (despesas)</span><span class="rv">${fmt(rel.pedro.pagouSaidas)}</span></div><div class="rel-row destaque"><span class="rl">Saldo do escritório</span><span class="rv" style="color:${r.saldo>=0?'var(--green)':'var(--red)'}">${fmt(r.saldo)}</span></div></div></div>${detalhesPessoa('igor',rel.igor)}${detalhesPessoa('pedro',rel.pedro)}`;
}
async function addTransacao() {
  const desc=document.getElementById('fDesc').value.trim();
  const valor=parseFloat(document.getElementById('fValor').value);
  const data=document.getElementById('fData').value;
  const cat=document.getElementById('fCat').value;
  if (!desc||!valor||!data||!cat){showToast('Preencha todos os campos!');return;}
  const btn=document.getElementById('btnAdd');
  btn.disabled=true;btn.textContent='Adicionando...';
  const r=await fetch('/api/transacoes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tipo:currentTipo,categoria:cat,descricao:desc,valor,data,pago_por:currentPessoa})});
  btn.disabled=false;btn.textContent='Adicionar lançamento';
  if(r.ok){document.getElementById('fDesc').value='';document.getElementById('fValor').value='';showToast('Lançamento adicionado! ✓');loadData();}else{showToast('Erro ao adicionar.');}
}
async function deleteTransacao(id){
  if(!confirm('Remover este lançamento?'))return;
  await fetch(`/api/transacoes/${id}`,{method:'DELETE'});
  showToast('Removido.');loadData();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
const hoje=new Date();
const offset=hoje.getTimezoneOffset();
const localHoje=new Date(hoje.getTime()-offset*60000);
document.getElementById('fData').value=localHoje.toISOString().split('T')[0];
setPessoa('igor');
updateMonthLabel();
loadCategorias();
loadData();
</script>
</body>
</html>
